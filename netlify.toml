[build]
  command = "npm run build"
  publish = "dist"

# SPA 폴백 — 모든 경로를 index.html로(클라이언트 라우팅).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 수신 라우트는 검색 인덱싱 금지(capability-links: noindex).
# L-1: 구체 경로 블록이 /* 를 덮어쓰므로 Referer 누출·클릭재킹 방어 헤더를 여기에도 명시한다.
[[headers]]
  for = "/l/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "DENY"

# Universal Links(iOS) — AASA는 확장자 없는 정적 파일이라 content-type을 명시해야 앱이 인식한다.
# 정적 파일이 존재하면 위 SPA 리라이트보다 우선 서빙된다. 실동작은 AASA 안의 TEAMID 교체 후.
[[headers]]
  for = "/.well-known/apple-app-site-association"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
